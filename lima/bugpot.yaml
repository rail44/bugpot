minimumLimaVersion: 2.0.0

# bugpot development VM.
#
# bugpot depends on Linux-only kernel features (libcontainer/youki, nftables,
# netns, bridge) that don't exist on macOS, so all builds and test runs
# happen inside this VM. Edits land on the macOS side via the writable
# virtiofs mount; cargo/sudo runs in here.
#
# Usage:
#   limactl create --name=bugpot ./lima/bugpot.yaml
#   limactl start bugpot
#   limactl shell bugpot
#   cd /Users/gam0282/src/github.com/rail44/bugpot
#   cargo build -p bugpotd
#   sudo -E ./target/debug/bugpotd         # or any scripts/smoke-*.sh

base:
- template:_images/ubuntu-24.04

vmType: vz
mountType: virtiofs
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

cpus: 4
memory: "8GiB"
disk: "50GiB"

# Only the repo is mounted, writable. Editor/IDE and git stay on the macOS
# side; the VM is purely a build & run target.
mounts:
- location: "/Users/gam0282/src/github.com/rail44/bugpot"
  writable: true

# bugpot listens on 127.0.0.1:8080 inside the VM. Forward it to the same
# address on the host so `curl http://alpha.localhost:8080/` works from
# macOS (the `*.localhost` wildcard resolves to 127.0.0.1, no /etc/hosts
# edits needed).
portForwards:
- guestPort: 8080
  hostPort: 8080

provision:
- mode: system
  script: |
    #!/bin/sh
    set -eux
    export DEBIAN_FRONTEND=noninteractive
    apt-get update -y
    apt-get install -y --no-install-recommends \
      build-essential pkg-config \
      libseccomp-dev \
      nftables iproute2 \
      ca-certificates curl git \
      bpftrace
# Open up the kernel's perf-event surface for the unprivileged user.
# Both knobs lower a security boundary — `perf_event_paranoid=-1`
# allows CPU profiling without `CAP_SYS_ADMIN`, and `kptr_restrict=0`
# unblurs kernel symbols so samply / flamegraphs name them. The
# trade-off is acceptable here because this VM is dev-only and the
# host is the trust boundary; do NOT carry these settings into any
# production image.
- mode: system
  script: |
    #!/bin/sh
    set -eux
    cat > /etc/sysctl.d/99-bugpot-perf.conf <<'EOF'
    # bugpot dev VM only — enables `samply` / `perf` without root.
    kernel.perf_event_paranoid = -1
    kernel.kptr_restrict = 0
    EOF
    sysctl -p /etc/sysctl.d/99-bugpot-perf.conf
- mode: user
  script: |
    #!/bin/sh
    set -eux
    if ! command -v rustup >/dev/null 2>&1; then
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
        | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
    fi
    for rc in "$HOME/.bashrc" "$HOME/.profile"; do
      if [ -f "$rc" ] && ! grep -q 'cargo/env' "$rc"; then
        echo '. "$HOME/.cargo/env"' >> "$rc"
      fi
    done
- mode: user
  # CPU profiler. Sampling tool that uploads to Firefox Profiler. Used
  # via `samply record -- ./target/release/bugpotd ...` then opens the
  # browser. `--locked` keeps the install reproducible. ~2 min compile
  # at first provision; idempotent thereafter.
  script: |
    #!/bin/sh
    set -eux
    . "$HOME/.cargo/env"
    if ! command -v samply >/dev/null 2>&1; then
      cargo install --locked samply
    fi
- mode: user
  # tokio-console: interactive task / resource debugger. Used after
  # `just build-console` / `just run-console` — attach with
  # `tokio-console http://127.0.0.1:6669` from another shell. Same
  # caveats as samply: ~2 min compile, idempotent.
  script: |
    #!/bin/sh
    set -eux
    . "$HOME/.cargo/env"
    if ! command -v tokio-console >/dev/null 2>&1; then
      cargo install --locked tokio-console
    fi
